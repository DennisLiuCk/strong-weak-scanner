name: daily-fetch

on:
  schedule:
    # 早場 台灣 18:07 = UTC 10:07：價格 + 三大法人 checkpoint。
    # 只 commit 原始 checkpoint，不重算／發布，避免持股、融資券、借券尚未終版時污染 OOS。
    - cron: "7 10 * * 1-5"
    # 第二次提前觸發 台灣 19:07 = UTC 11:07：實際啟動若尚未到 23:40，
    # 只重試早場 checkpoint；若 GitHub 延遲至終版門檻後，直接走 complete。
    - cron: "7 11 * * 1-5"
    # 台灣 21:47 = UTC 13:47：提前排隊吸收 Actions 延遲；實際啟動若尚未到
    # 23:40 仍只做 checkpoint，跨過終版門檻才走 complete。
    - cron: "47 13 * * 1-5"
    # 台灣 23:47 = UTC 15:47：終版安全網，五表完整才評分、凍結 OOS 與發布。
    - cron: "47 15 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "complete=23:40 後正式補完並發布；early=只抓價格/法人 checkpoint"
        required: true
        default: complete
        type: choice
        options:
          - complete
          - early

permissions:
  contents: write          # 允許把更新後的 db commit 回 repo
  pages: read              # 驗證 legacy Pages build 已部署本次 commit

concurrency:
  group: repo-main-writer
  cancel-in-progress: false
  queue: max

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 決定早場或正式補完模式
        id: mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          REQUESTED_MODE: ${{ inputs.mode }}
        run: |
          mode=complete
          if [ "$EVENT_NAME" = "schedule" ] && [ "$SCHEDULE" = "7 10 * * 1-5" ]; then
            mode=early
          elif [ "$EVENT_NAME" = "schedule" ] && [ "$SCHEDULE" = "7 11 * * 1-5" ]; then
            # 19:07 只是提前排隊；實際啟動跨過 UTC 15:40(台灣 23:40)才允許正式發布。
            if [ "$(date -u +%H%M)" -lt 1540 ]; then
              mode=early
            fi
          elif [ "$EVENT_NAME" = "schedule" ] && [ "$SCHEDULE" = "47 13 * * 1-5" ]; then
            # 21:47 提前排隊；實際啟動跨過 UTC 15:40(台灣 23:40)才允許正式發布。
            if [ "$(date -u +%H%M)" -lt 1540 ]; then
              mode=early
            fi
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$REQUESTED_MODE" ]; then
            mode="$REQUESTED_MODE"
          fi
          # 所有台灣晚間 cron 在 UTC 都仍是同一交易日；即使 runner 延遲跨過台北午夜，
          # UTC 日期仍可鎖定原排程要補的交易日，避免誤把隔日當成 final-pass 目標。
          target_date=$(date -u +%F)
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "target_date=$target_date" >> "$GITHUB_OUTPUT"
          echo "本次模式: $mode"
          echo "資料目標日: $target_date"

      # 必須排在 fetch_daily 之前:build_metrics(fetch_daily 內)讀 tdcc_holding 算觀察欄,
      # 排後面會讓新快照晚一天才進 daily_metrics。TDCC opendata 只給最新一週(週六更新)、
      # 失敗自動 exit 0 不擋管線;週一~五每天重抓同一快照 = 冪等 + 5 次保險。
      - name: 抓取 TDCC 股權分散週快照(免 token)
        if: steps.mode.outputs.mode == 'complete'
        run: python scripts/fetch_tdcc.py

      - name: 抓取本階段原始資料
        id: fetch_daily
        continue-on-error: true
        env:
          FETCH_MODE: ${{ steps.mode.outputs.mode }}
          TARGET_DATE: ${{ steps.mode.outputs.target_date }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_TOKEN2: ${{ secrets.FINMIND_TOKEN2 }}   # 選配:402 額度輪替備援(secret 未設=自動略過)
          FINMIND_TOKEN3: ${{ secrets.FINMIND_TOKEN3 }}   # 選配:第三組獨立額度
        run: |
          if [ "$FETCH_MODE" = "early" ]; then
            python scripts/fetch_daily.py \
              --datasets TaiwanStockPrice,TaiwanStockInstitutionalInvestorsBuySell \
              --raw-only
          else
            python scripts/fetch_daily.py --final-pass --end "$TARGET_DATE"
          fi

      # runner 是一次性的；fetch_daily 雖逐檔 commit SQLite，若不 push 回 repo，失敗前
      # 的進度仍會隨 runner 消失。只保存 data/，不更新分數快照或網站；下次 run 會由
      # SQLite 缺口與事件 coverage 接續。任務最後仍標紅，避免把未完成資料當正式發布。
      - name: 保存未完成抓取進度
        if: always() && steps.fetch_daily.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "抓取失敗前沒有新增進度"
            exit 0
          fi
          git commit -m "data: $(date -u +%Y-%m-%d) 每日抓取進度（未完成）"
          for i in 1 2 3 4 5; do
            commit_sha=$(git rev-parse HEAD)
            if git push; then
              git fetch origin main
              if ! git merge-base --is-ancestor "$commit_sha" origin/main; then
                echo "::error::push 回報成功，但遠端 main 不包含 $commit_sha"
                exit 1
              fi
              exit 0
            fi
            echo "進度 push 被拒(第 $i 次)——fetch + rebase 後重試"
            git fetch origin main
            if ! git rebase origin/main; then
              echo "::warning::rebase 衝突，未完成進度未能落地"
              git rebase --abort
              exit 1
            fi
            sleep 5
          done
          echo "::error::push 重試 5 次仍失敗，未完成進度未能落地"
          exit 1

      - name: 抓取未完成，停止後續發布
        if: always() && steps.fetch_daily.outcome == 'failure'
        run: |
          echo "::error::每日抓取未完成；已嘗試保存部分進度，停止評分、OOS 快照與儀表板發布"
          exit 1

      - name: 計算五元素分數與 tier
        if: steps.mode.outputs.mode == 'complete'
        run: python scripts/score.py

      # daily_scores 會因資料回補、universe/分組與策略調整而重算全歷史；在重生並發布
      # 儀表板前，把本次 run 實際可見的原始指標+分數 append-only 凍結，供 OOS 驗證。
      - name: 凍結 OOS as-seen 訊號快照
        if: steps.mode.outputs.mode == 'complete'
        run: python scripts/snapshot_signals.py --publish

      - name: 重生儀表板 HTML
        if: steps.mode.outputs.mode == 'complete'
        run: python scripts/build_dashboard.py

      - name: commit 回 repo(有變動才提交)
        id: commit_push
        env:
          FETCH_MODE: ${{ steps.mode.outputs.mode }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "$FETCH_MODE" = "early" ]; then
            git add data/
            message="data: $(date -u +%Y-%m-%d) 早場官方資料 checkpoint"
          else
            git add data/ index.html archive/
            message="data: $(date -u +%Y-%m-%d) 五元素更新"
          fi
          if git diff --staged --quiet; then
            echo "無新資料,略過 commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "$message"
          # main 上若同時有其他 push(手動 session等),直接 push 會被拒。
          # fetch + rebase 後重試；SQLite 無法自動合併時必須標紅，不得假成功。
          for i in 1 2 3 4 5; do
            commit_sha=$(git rev-parse HEAD)
            if git push; then
              git fetch origin main
              if ! git merge-base --is-ancestor "$commit_sha" origin/main; then
                echo "::error::push 回報成功，但遠端 main 不包含 $commit_sha"
                exit 1
              fi
              echo "### Daily Fetch 已落地" >> "$GITHUB_STEP_SUMMARY"
              echo "- commit: \`$commit_sha\`" >> "$GITHUB_STEP_SUMMARY"
              echo "- Pages: https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/" >> "$GITHUB_STEP_SUMMARY"
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "push 被拒(第 $i 次)——fetch + rebase 後重試"
            git fetch origin main
            if ! git rebase origin/main; then
              echo "::error::rebase 衝突，本次 commit 未能落地"
              git rebase --abort
              exit 1
            fi
            sleep 5
          done
          echo "::error::push 重試 5 次仍失敗,本次資料未落地"
          exit 1

      - name: 確認 GitHub Pages 部署本次 commit
        if: steps.mode.outputs.mode == 'complete' && steps.commit_push.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ steps.commit_push.outputs.commit_sha }}
        run: |
          for i in $(seq 1 60); do
            payload=$(gh api "repos/$GITHUB_REPOSITORY/pages/builds/latest" 2>/dev/null || true)
            page_commit=$(jq -r '.commit // ""' <<< "$payload")
            page_status=$(jq -r '.status // ""' <<< "$payload")
            if [ "$page_commit" = "$COMMIT_SHA" ]; then
              if [ "$page_status" = "built" ]; then
                echo "Pages 已部署 $COMMIT_SHA"
                echo "- Pages deployment: built" >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
              if [ "$page_status" = "errored" ]; then
                echo "::error::Pages 部署失敗:$COMMIT_SHA"
                exit 1
              fi
            fi
            sleep 5
          done
          echo "::error::5 分鐘內未確認 Pages 部署本次 commit:$COMMIT_SHA"
          exit 1
