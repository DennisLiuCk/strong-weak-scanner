name: daily-fetch

on:
  schedule:
    # 台灣 22:00 = UTC 14:00,週一~五(台股交易日)。
    # 遇台股假日抓不到新資料時,commit 步驟會自動略過。
    #
    # 為什麼是 22:00 —— FinMind 各 dataset 每日更新時間(官方文件,台北時間;
    # 「實際更新時間以 API 資料為主」,可能漂移):
    #   16:50  TaiwanStockTotalReturnIndex(大盤 regime)
    #   17:30  TaiwanStockPrice(①價②量)
    #   20:00  TaiwanStockInstitutionalInvestorsBuySell(③④法人買賣超)
    #   21:00  TaiwanStockShareholding(③外資持股)
    #   21:00  TaiwanStockMarginPurchaseShortSale(⑤融資券)
    # 若早於 21:00 執行,當日籌碼缺值會被靜默當 0/舊值計分,隔日回補後
    # 整表重建無痕改寫 → 決策時點與回測(validate.py)看到的資料不一致。
    # 舊排程 18:00 只有價量是當日的,③④⑤ 全缺(2026-07-05 對抗性驗證)。
    # GitHub cron 高峰期可能延遲 15~60 分——此設計下「晚」是安全方向。
    - cron: "0 14 * * 1-5"
  workflow_dispatch: {}   # 允許手動觸發(測試用)

permissions:
  contents: write          # 允許把更新後的 db commit 回 repo

concurrency:
  group: daily-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 必須排在 fetch_daily 之前:build_metrics(fetch_daily 內)讀 tdcc_holding 算觀察欄,
      # 排後面會讓新快照晚一天才進 daily_metrics。TDCC opendata 只給最新一週(週六更新)、
      # 失敗自動 exit 0 不擋管線;週一~五每天重抓同一快照 = 冪等 + 5 次保險。
      - name: 抓取 TDCC 股權分散週快照(免 token)
        run: python scripts/fetch_tdcc.py

      - name: 抓取五元素並重算 daily_metrics
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_TOKEN2: ${{ secrets.FINMIND_TOKEN2 }}   # 選配:402 額度輪替備援(secret 未設=自動略過)
        run: python scripts/fetch_daily.py

      - name: 計算五元素分數與 tier
        run: python scripts/score.py

      - name: 重生儀表板 HTML
        run: python scripts/build_dashboard.py

      - name: commit 回 repo(有變動才提交)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ index.html archive/
          if git diff --staged --quiet; then
            echo "無新資料,略過 commit"
          else
            git commit -m "data: $(date -u +%Y-%m-%d) 五元素更新"
            git push
          fi
