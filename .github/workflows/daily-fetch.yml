name: daily-fetch

on:
  schedule:
    # 台灣 21:40 = UTC 13:40,週一~五(台股交易日),落在收盤後 21-22 點窗口。
    # 遇台股假日抓不到新資料時,commit 步驟會自動略過。
    #
    # 為什麼是 21:40 —— FinMind 各 dataset 每日更新時間(官方文件,台北時間;
    # 「實際更新時間以 API 資料為主」,可能漂移):
    #   16:50  TaiwanStockTotalReturnIndex(大盤 regime)
    #   17:30  TaiwanStockPrice(①價②量)
    #   20:00  TaiwanStockInstitutionalInvestorsBuySell(③④法人買賣超)
    #   21:00  TaiwanStockShareholding(③外資持股)
    #   21:00  TaiwanStockMarginPurchaseShortSale(⑤融資券)
    # 若早於 21:00 執行,當日籌碼缺值會被靜默當 0/舊值計分,隔日回補後
    # 整表重建無痕改寫 → 決策時點與回測(validate.py)看到的資料不一致;
    # 21:40 在 21:00 之後留 40 分鐘緩衝,同時避開整點(:00)尖峰。
    # 舊排程 18:00 只有價量是當日的,③④⑤ 全缺(2026-07-05 對抗性驗證)。
    # GitHub cron 高峰期可能大幅延遲(2026-07-06 觀察到整點 :00 排程實際延遲
    # 2 小時 51 分才觸發,見官方文件建議避開整點)——此設計下「晚」是安全方向。
    - cron: "40 13 * * 1-5"
  workflow_dispatch: {}   # 允許手動觸發(測試用)

permissions:
  contents: write          # 允許把更新後的 db commit 回 repo

concurrency:
  group: daily-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 必須排在 fetch_daily 之前:build_metrics(fetch_daily 內)讀 tdcc_holding 算觀察欄,
      # 排後面會讓新快照晚一天才進 daily_metrics。TDCC opendata 只給最新一週(週六更新)、
      # 失敗自動 exit 0 不擋管線;週一~五每天重抓同一快照 = 冪等 + 5 次保險。
      - name: 抓取 TDCC 股權分散週快照(免 token)
        run: python scripts/fetch_tdcc.py

      - name: 抓取五元素並重算 daily_metrics
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_TOKEN2: ${{ secrets.FINMIND_TOKEN2 }}   # 選配:402 額度輪替備援(secret 未設=自動略過)
        run: python scripts/fetch_daily.py

      - name: 計算五元素分數與 tier
        run: python scripts/score.py

      # daily_scores 會因資料回補、universe/分組與策略調整而重算全歷史；在重生並發布
      # 儀表板前，把本次 run 實際可見的原始指標+分數 append-only 凍結，供 OOS 驗證。
      - name: 凍結 OOS as-seen 訊號快照
        run: python scripts/snapshot_signals.py --publish

      - name: 重生儀表板 HTML
        run: python scripts/build_dashboard.py

      - name: commit 回 repo(有變動才提交)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ index.html archive/
          if git diff --staged --quiet; then
            echo "無新資料,略過 commit"
            exit 0
          fi
          git commit -m "data: $(date -u +%Y-%m-%d) 五元素更新"
          # main 上若同時有其他 push(手動 session、另一次跑),直接 push 會被拒。
          # fetch + rebase 後重試;若 rebase 真的衝突(同一批資料已落地),放棄本次 commit。
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "push 被拒(第 $i 次)——fetch + rebase 後重試"
            git fetch origin main
            if ! git rebase origin/main; then
              echo "::warning::rebase 衝突(資料可能已被別的 push 落地),放棄本次 commit"
              git rebase --abort
              exit 0
            fi
            sleep 5
          done
          echo "::error::push 重試 5 次仍失敗,本次資料未落地"
          exit 1
