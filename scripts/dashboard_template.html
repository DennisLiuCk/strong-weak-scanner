<style>
/* ============================================================
   優化版視覺 token —— 對應 build_dashboard.py 模板的 :root
   紅=強 綠=弱（台股慣例）；藍=籌碼健康；琥珀=風險提醒
   ============================================================ */
:root{
  --paper:#f4f2ec; --card:#fdfcfa; --inset:#f1eee6; --ink:#1a1712; --ink2:#57513f; --muted:#8b8574;
  --line:rgba(26,23,18,0.11); --line2:rgba(26,23,18,0.055);
  --strong:#c0261f; --strongbg:rgba(192,38,31,0.10); --strongbg2:rgba(192,38,31,0.20);
  --weak:#0b7a43; --weakbg:rgba(11,122,67,0.10); --weakbg2:rgba(11,122,67,0.20);
  --neu:#8b8574; --neubg:rgba(139,133,116,0.13);
  --teal:#0f6d82; --tealbg:rgba(15,109,130,0.12);
  --amber:#b07417; --amberbg:rgba(176,116,23,0.15);
  --trap:#8a1a10; --track:#ddd6c6;
  --ma5:#b26a12; --ma20:#0b66b2; --ma60:#6f4ba8;
  --hypobg:#f6f4ff; --hypoline:#ddd6fe; --hypodot:#7c3aed; --hypoink:#4c2f9c; --hypotext:#5b5170;
}
:root[data-theme="dark"]{
  --paper:#100f0a; --card:#191712; --inset:#211e17; --ink:#f4f2e9; --ink2:#c8c2b1; --muted:#9c968a;
  --line:rgba(255,255,255,0.13); --line2:rgba(255,255,255,0.05);
  --strong:#ff746e; --strongbg:rgba(255,116,110,0.14); --strongbg2:rgba(255,116,110,0.26);
  --weak:#43c66f; --weakbg:rgba(67,198,111,0.14); --weakbg2:rgba(67,198,111,0.24);
  --neu:#9c968a; --neubg:rgba(156,150,138,0.14);
  --teal:#5cc2e8; --tealbg:rgba(92,194,232,0.16);
  --amber:#e0a83a; --amberbg:rgba(224,168,58,0.18);
  --trap:#ff9d94; --track:#3a362b;
  --ma5:#ff9d4d; --ma20:#62b5ff; --ma60:#c4a7ff;
  --hypobg:rgba(124,58,237,0.13); --hypoline:rgba(124,58,237,0.42); --hypodot:#a684ff; --hypoink:#c9b6ff; --hypotext:#b3a7cf;
}
@media (prefers-color-scheme:dark){ :root:not([data-theme="light"]){
  --paper:#100f0a; --card:#191712; --inset:#211e17; --ink:#f4f2e9; --ink2:#c8c2b1; --muted:#9c968a;
  --line:rgba(255,255,255,0.13); --line2:rgba(255,255,255,0.05);
  --strong:#ff746e; --strongbg:rgba(255,116,110,0.14); --strongbg2:rgba(255,116,110,0.26);
  --weak:#43c66f; --weakbg:rgba(67,198,111,0.14); --weakbg2:rgba(67,198,111,0.24);
  --neu:#9c968a; --neubg:rgba(156,150,138,0.14);
  --teal:#5cc2e8; --tealbg:rgba(92,194,232,0.16);
  --amber:#e0a83a; --amberbg:rgba(224,168,58,0.18);
  --trap:#ff9d94; --track:#3a362b;
  --ma5:#ff9d4d; --ma20:#62b5ff; --ma60:#c4a7ff;
  --hypobg:rgba(124,58,237,0.13); --hypoline:rgba(124,58,237,0.42); --hypodot:#a684ff; --hypoink:#c9b6ff; --hypotext:#b3a7cf;
} }
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--paper);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;
  font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif}
.mono{font-family:'IBM Plex Mono',Consolas,ui-monospace,monospace;font-variant-numeric:tabular-nums}
a{color:var(--teal);text-decoration:none} a:hover{color:#0a5060;text-decoration:underline}
.wrap{max-width:1180px;margin:0 auto;padding:44px 44px 120px}
.brandrule{width:38px;height:4px;background:var(--strong);border-radius:2px;margin-bottom:18px}
h1{margin:0 0 14px;font-size:40px;line-height:1.15;font-weight:900;letter-spacing:.5px;text-wrap:balance}
.kicker{margin:0 0 6px;font-size:12px;font-weight:800;letter-spacing:.16em;color:var(--muted)}
h2.sec{margin:0 0 6px;font-size:28px;font-weight:800;letter-spacing:.3px}
.lead{margin:0 0 24px;max-width:70ch;font-size:15px;color:var(--ink2)}
.sub{margin:0;max-width:70ch;font-size:16px;color:var(--ink2)}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;
  box-shadow:0 1px 2px rgba(26,23,18,.04),0 14px 30px rgba(26,23,18,.05)}
.card.pad{padding:22px}
.badgeid{font-family:'IBM Plex Mono';font-size:13px;font-weight:600;color:#fff;background:var(--ink);border-radius:7px;padding:3px 9px}
.opthd{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.opthd b{font-size:16px} .opthd span{font-size:12.5px;color:var(--muted)}
.chip{font-size:11px;font-weight:700;border-radius:100px;padding:2px 9px;white-space:nowrap}
section.blk{max-width:1180px;margin:86px auto 0}
h3.sub3{margin:0 0 4px;font-size:15px;font-weight:800}
.note{font-size:12px;color:var(--muted)}
/* strip tile（五面向骨架） */
.strip{display:flex;gap:6px}
.tile{flex:1;text-align:center;border-radius:9px;padding:6px 3px 5px}
.tile .lb{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.3px}
.tile .gl{font-size:13px;font-weight:800;line-height:1.3}
.tile .vv{font-size:9.5px;color:var(--ink2);white-space:nowrap}
.s2{background:var(--strongbg2)} .s1{background:var(--strongbg)} .s0{background:var(--neubg)}
.sm1{background:var(--weakbg)} .sm2{background:var(--weakbg2)}
.cstrong{color:var(--strong)} .cweak{color:var(--weak)} .cmuted{color:var(--muted)}
.cteal{color:var(--teal)} .camber{color:var(--amber)}
svg{display:block;overflow:visible}
.togglebtn{display:inline-flex;align-items:center;gap:7px;cursor:pointer;background:var(--card);border:1px solid var(--line);color:var(--ink2);border-radius:100px;padding:7px 14px;font:inherit;font-size:12.5px}
.togglebtn:hover{color:var(--ink);border-color:var(--muted)}
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin:0 0 14px}
.msearch{font:inherit;font-size:13px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:100px;padding:8px 15px;min-width:220px;outline:none}
.msearch::placeholder{color:var(--muted)} .msearch:focus{border-color:var(--strong)}
.sortbtn{cursor:pointer;font:inherit;font-size:12.5px;font-weight:600;color:var(--ink2);background:var(--card);border:1px solid var(--line);border-radius:100px;padding:8px 14px}
.sortbtn:hover{border-color:var(--muted);color:var(--ink)}
.mcount{font-size:12px;color:var(--muted);margin-left:auto}
.clickrow{cursor:pointer;transition:background .1s ease} .clickrow:hover{background:var(--inset)}
.clickrow:focus-visible{outline:2px solid var(--strong);outline-offset:-2px}

.rtab[aria-selected="true"]{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.12)}
.nbsec{border-top:1px solid var(--line2)}
.nbsec>summary{list-style:none} .nbsec>summary::-webkit-details-marker{display:none} .nbsec>summary::before{content:'\25b8';color:var(--muted);margin-right:8px;display:inline-block} .nbsec[open]>summary::before{transform:rotate(90deg)}
.nbsec a{color:var(--teal)}
.hide{display:none!important}
#sheetwrap{position:fixed;inset:0;z-index:60;display:flex;justify-content:flex-end;visibility:hidden;pointer-events:none}
#sheetwrap.on{visibility:visible;pointer-events:auto}
#backdrop{position:absolute;inset:0;background:rgba(8,7,4,.42);opacity:0;transition:opacity .25s ease}
#sheetwrap.on #backdrop{opacity:1}
#sheet{position:relative;width:min(880px,100%);height:100%;overflow-y:auto;background:var(--card);border-left:1px solid var(--line);box-shadow:-8px 0 40px rgba(0,0,0,.2);padding:22px 26px 40px;transform:translateX(100%);transition:transform .28s cubic-bezier(.32,.72,0,1)}
#sheetwrap.on #sheet{transform:translateX(0)}
.sheetclose{position:absolute;top:14px;right:16px;width:38px;height:38px;border-radius:100px;background:var(--inset);border:1px solid var(--line);color:var(--ink2);cursor:pointer;font-size:15px}
.sheetclose:hover{color:var(--ink)}
@media(max-width:680px){#sheetwrap{align-items:flex-end}#sheet{width:100%;height:auto;max-height:86vh;border-left:none;border-radius:18px 18px 0 0;transform:translateY(100%)}#sheetwrap.on #sheet{transform:translateY(0)}}
/* ---------- 響應式與觸控（移植自舊版 UX 契約：窄幅改卡片、觸控目標 min-height:44px） ---------- */
.quicknav{display:flex;flex-wrap:wrap;gap:6px;margin:18px 0 0}
.quicknav a{font-size:12.5px;font-weight:700;color:var(--ink2);background:var(--card);border:1px solid var(--line);border-radius:100px;padding:7px 14px}
.quicknav a:hover{color:var(--ink);border-color:var(--muted);text-decoration:none}
.srow{display:grid;grid-template-columns:44px minmax(210px,1fr) 340px minmax(200px,240px);gap:22px;align-items:center}
.shead{align-items:end}
.board-row{display:grid;grid-template-columns:30px minmax(120px,1fr) 150px 150px;gap:14px;align-items:center}
.bhead{align-items:end}
.grow{display:grid;grid-template-columns:132px 1fr;gap:14px;align-items:center}
.tband{display:grid;grid-template-columns:210px 1fr;gap:22px;align-items:center}
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px 28px}
.dgrid{display:grid;grid-template-columns:1.5fr 1fr;gap:30px;margin-top:28px;align-items:start}
.stepgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px}
.hscroll{overflow-x:auto}
.hscroll>*{min-width:640px}
@media (max-width:1240px){.wrap{padding:32px 22px 90px}}
@media (max-width:1000px){.fgrid{grid-template-columns:1fr 1fr}.dgrid{grid-template-columns:1fr}}
@media (max-width:900px){.srow{grid-template-columns:34px minmax(150px,1fr) minmax(200px,1fr)}.srow>*:nth-child(4){grid-column:2/-1}}
@media (max-width:720px){
  h1{font-size:30px} h2.sec{font-size:22px}
  .stepgrid,.fgrid{grid-template-columns:1fr}
  .tband{grid-template-columns:1fr;gap:10px}
  .grow{grid-template-columns:1fr;gap:6px}
  .srow{grid-template-columns:1fr;gap:10px}
  .srow>*:nth-child(1){display:none}
  .srow>*:nth-child(4){grid-column:auto}
  .shead{display:none}
  .board-row{grid-template-columns:24px 1fr;gap:8px 12px}
  .board-row>*:nth-child(3),.board-row>*:nth-child(4){grid-column:2/-1}
  .bhead{display:none}
  .togglebtn,.sortbtn,.rtab,.sheetclose,.msearch,.quicknav a{min-height:44px}
  .quicknav a{display:inline-flex;align-items:center}
  .clickrow{min-height:44px}
}
</style>

<body>
<div class="wrap">

  <header style="position:relative">
    <button class="togglebtn" id="themeBtn" style="position:fixed;top:16px;right:16px;z-index:50" aria-label="切換深淺色">◐ 深／淺色</button>
    <div class="brandrule"></div>
    <p class="kicker" style="color:var(--strong)">台股半導體與 AI 供應鏈 · 汰弱留強掃描</p>
    <h1>__H1__</h1>
    <p class="sub">每個交易日收盤後，把同族群個股放上同一把尺：比較價格與抗跌、法人原始買賣及其同業位置、融資槓桿，再依公開規則分層。每個分數都可點開，看原始數據、判讀與資料來源。</p>
    <nav class="quicknav" aria-label="快速導覽">
      <a href="#ov">今日重點</a><a href="#tsmc">台積電專區</a><a href="#grp">族群比較</a><a href="#tier">個股分層</a><a href="#stocks">族群內個股</a>
    </nav>
  </header>

  <!-- 各段由 JS 建構 -->
  <main id="main">
    <section id="ov" class="blk" style="margin-top:56px"></section>
    <section id="tsmc" class="blk"></section>
    <section id="grp" class="blk"></section>
    <section id="tier" class="blk"></section>
    <section id="stocks" class="blk"></section>
  </main>

</div>

<script>
/* ============================================================
   build_dashboard.py 注入以下 placeholder（勿刪）；下方 adapter 轉成 render 函式吃的 D。
   詳情面板改由點選個股時，用 D.byId[id]（完整 DATA 物件）渲染進 #sheet。
   ============================================================ */
const DATA=__DATA_JSON__, GROUPS=__GROUPS_JSON__, TIERS=__TIERS_JSON__, TIER_FLOW=__TIER_FLOW_JSON__,
      OVERVIEW=__OVERVIEW_JSON__, GRP=__GRPMETA_JSON__, WEIGHTS=__WEIGHTS_JSON__, THRESH=__THRESH_JSON__,
      TSMC=__TSMC_JSON__, DATE_ISO="__DATE_ISO__", DATE_STR="__DATE__";
function _slim(s){ return {g:s.g,id:s.id,nm:s.nm,biz:s.biz,comp:s.comp,tier:s.tier_confirmed,
  tierLabel:s.tier_label,waiting:s.tier_waiting,
  f:(s.factors||[]).map(function(f){return [f.label,f.score,f.weight];}),
  cs:(s.cells||[]).map(function(c){return c[0];}), cv:(s.cells||[]).map(function(c){return c[1];}), cr:(s.cells||[]).map(function(c){return c[3];}),
  tech:[s.tech?s.tech.cls:'flat', s.tech?s.tech.label:'—'],
  chip:[s.chip?s.chip.cls:'neutral', s.chip?s.chip.label:'中性'],
  fund:s.fund?[s.fund.cls,(s.fund.rows.find(function(r){return /年增/.test(r[0]);})||[])[1]||s.fund.label]:null,
  note:s.note?[s.note.cls,s.note.summary]:null, risk:(s.risk||[]).map(function(r){return r.kind;})}; }
function _adaptTSMC(T){ if(!T||!T.event)return null; const e=T.event;
  return {quarter:e.quarter||'', eventDate:e.date||'', status:e.vcls||'', statusLabel:e.vlabel||'', url:e.url,
    kpis:(e.kpi||[]).map(function(kv){return {k:kv[0],v:kv[1],note:''};}),
    guidance:(e.guidance||[]).map(function(g){return {g:g.g,dir:g.dir,text:g.text};}),
    signals:[]}; }
const D={ groups:GROUPS, grpMeta:GRP, overview:OVERVIEW, tierFlow:TIER_FLOW, date:DATE_STR,
  stocks:DATA.map(_slim),
  allStocks:DATA.map(function(s){return {id:s.id,nm:s.nm,g:s.g,comp:s.comp,tier:s.tier_confirmed,tl:s.tier_label,w:s.tier_waiting};}),
  byId:Object.fromEntries(DATA.map(function(s){return [s.id,s];})),
  tsmc:_adaptTSMC(TSMC) };

/* ---------- DOM 小工具 ---------- */
const NS='http://www.w3.org/2000/svg';
function h(tag,attrs,...kids){
  const e=document.createElement(tag);
  for(const k in (attrs||{})){
    const v=attrs[k];
    if(k==='class')e.className=v;
    else if(k==='style')e.style.cssText=v;
    else if(k==='html')e.innerHTML=v;
    else if(k==='text')e.textContent=v;
    else if(k.startsWith('on')&&typeof v==='function')e.addEventListener(k.slice(2),v);
    else if(v!=null)e.setAttribute(k,v);
  }
  for(const kid of kids.flat()){ if(kid==null||kid===false)continue;
    e.appendChild(kid.nodeType?kid:document.createTextNode(String(kid))); }
  return e;
}
function sv(tag,attrs,...kids){ const e=document.createElementNS(NS,tag);
  for(const k in (attrs||{})) if(attrs[k]!=null) e.setAttribute(k,attrs[k]);
  for(const kid of kids.flat()) if(kid) e.appendChild(kid); return e; }
function svg(w,ht,kids,style){ const s=sv('svg',{viewBox:`0 0 ${w} ${ht}`,width:'100%',preserveAspectRatio:'xMidYMid meet'});
  s.style.cssText='display:block;overflow:visible;'+(style||''); (kids||[]).forEach(k=>k&&s.appendChild(k)); return s; }

/* ---------- 共用色階／文字 ---------- */
function sinfo(sc){ return sc>=2?{g:'▲▲',col:'var(--strong)',cls:'s2'}:sc===1?{g:'▲',col:'var(--strong)',cls:'s1'}
  :sc===0?{g:'—',col:'var(--muted)',cls:'s0'}:sc===-1?{g:'▼',col:'var(--weak)',cls:'sm1'}:{g:'▼▼',col:'var(--weak)',cls:'sm2'}; }
function tierStyle(t){ if(/過熱/.test(t))return{col:'var(--amber)',bg:'var(--amberbg)'}; if(/真強/.test(t))return{col:'var(--strong)',bg:'var(--strongbg)'};
  if(/蓄勢/.test(t))return{col:'var(--teal)',bg:'var(--tealbg)'}; if(/真弱|陷阱/.test(t))return{col:'var(--weak)',bg:'var(--weakbg)'}; return{col:'var(--muted)',bg:'var(--neubg)'}; }
function stateStyle(s){ if(/領漲|發動/.test(s))return{col:'var(--strong)',bg:'var(--strongbg)'}; if(/退潮/.test(s))return{col:'var(--weak)',bg:'var(--weakbg)'};
  if(/佈局|蓄勢/.test(s))return{col:'var(--teal)',bg:'var(--tealbg)'}; return{col:'var(--muted)',bg:'var(--neubg)'}; }
function tierRank(k){ const m={'真強':5,'強但過熱':4,'蓄勢·外資佈局':3,'潛在/中性':2,'真弱':1,'真弱·陷阱':0}; return k in m?m[k]:2; }
function tierColorKey(k){ if(/真強/.test(k))return'var(--strong)'; if(/過熱/.test(k))return'var(--amber)'; if(/蓄勢/.test(k))return'var(--teal)'; if(/陷阱/.test(k))return'var(--trap)'; if(/真弱/.test(k))return'var(--weak)'; return'var(--muted)'; }
function tierShort(k){ const m={'真強':'強','強但過熱':'過熱','蓄勢·外資佈局':'蓄勢','潛在/中性':'中性','真弱':'弱','真弱·陷阱':'陷阱'}; return m[k]||k; }
const grp=g=>D.grpMeta[g]||{short:g,nm:g};
function plainVerdict(cs){
  const nm=[['價格贏同業','價格輸同業'],['量能活絡','量能偏縮'],['外資加碼','外資減碼'],['投信買超','投信賣超'],['融資去槓桿','融資擁擠']];
  const pos=[],neg=[]; cs.forEach((sc,i)=>{ if(sc>=1)pos.push([sc,nm[i][0]]); else if(sc<=-1)neg.push([sc,nm[i][1]]); });
  pos.sort((a,b)=>b[0]-a[0]); neg.sort((a,b)=>a[0]-b[0]); const P=pos.map(x=>x[1]),N=neg.map(x=>x[1]);
  if(P.length&&N.length)return P.slice(0,2).join('、')+'，但'+N.slice(0,2).join('、');
  if(P.length)return '同族群裡'+P.slice(0,3).join('、'); if(N.length)return N.slice(0,3).join('、'); return '各項指標接近同族群中段';
}

/* ---------- SVG 圖形 ---------- */
function diverg(v,max,w=120,ht=12){ const cx=w/2,fw=Math.min(Math.abs(v)/max,1)*(cx-2),k=[];
  k.push(sv('rect',{x:0,y:ht/2-3,width:w,height:6,rx:3,fill:'var(--inset)'}));
  k.push(sv('line',{x1:cx,y1:0,x2:cx,y2:ht,stroke:'var(--line)','stroke-width':1}));
  if(v)k.push(sv('rect',{x:v>0?cx:cx-fw,y:ht/2-3,width:Math.max(2,fw),height:6,rx:3,fill:v>0?'var(--strong)':'var(--weak)'}));
  const s=svg(w,ht,k,'height:'+ht+'px'); return s; }
function meter(frac,w=120,ht=12,col='var(--teal)'){ return svg(w,ht,[
  sv('rect',{x:0,y:ht/2-3,width:w,height:6,rx:3,fill:'var(--inset)'}),
  sv('rect',{x:0,y:ht/2-3,width:Math.max(2,Math.min(1,frac)*w),height:6,rx:3,fill:col})],'height:'+ht+'px'); }
function flowSpark(states){ const w=104,ht=32,P=5,n=states.length,pts=states.map(tierRank);
  const X=i=>P+i/(n-1)*(w-2*P),Y=r=>ht-P-(r/5)*(ht-2*P);
  const d=pts.map((r,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(r).toFixed(1)).join(' ');
  const endCol=tierColorKey(states[n-1]),k=[sv('path',{d,fill:'none',stroke:'var(--muted)','stroke-width':2,'stroke-linecap':'round','stroke-linejoin':'round',opacity:.5})];
  pts.forEach((r,i)=>k.push(sv('circle',{cx:X(i),cy:Y(r),r:i===n-1?3.6:2,fill:i===n-1?endCol:'var(--muted)',opacity:i===n-1?1:.45})));

function lineChart(series,w=520,ht=150){ const P=8,Pb=16; let all=[]; series.forEach(s=>all=all.concat(s.v));
